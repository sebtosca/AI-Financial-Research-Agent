services:
  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_CORS_ORIGINS: http://localhost
      CHROMA_DB_DIR: /data/chroma
      DOCS_PATH: /data/documents
      ZIP_FILE: /data/documents/Companies-AI-Initiatives.zip
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_POOL_MIN_SIZE: 1
      DATABASE_POOL_MAX_SIZE: 10
      DATABASE_POOL_TIMEOUT: 30
    volumes:
      - chroma_data:/data/chroma
      - rag_documents:/data/documents:ro
    depends_on:
      postgres:
        condition: service_healthy
      rag-indexer:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

  rag-indexer:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      CHROMA_DB_DIR: /data/chroma
      DOCS_PATH: /data/documents
      ZIP_FILE: /data/source/Companies-AI-Initiatives.zip
      RAG_REBUILD_INDEX: "false"
    command: ["python", "-m", "app.rag.index"]
    volumes:
      - chroma_data:/data/chroma
      - rag_documents:/data/documents
      - ./docs:/data/source:ro
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /backend
    restart: unless-stopped
    environment:
      NODE_ENV: production

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus"]
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  chroma_data:
  rag_documents:
  prometheus_data:
  grafana_data:
